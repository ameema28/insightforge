steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/insightforge:$SHORT_SHA'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/insightforge:$SHORT_SHA'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'insightforge'
      - '--image'
      - 'gcr.io/$PROJECT_ID/insightforge:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GROQ_API_KEY=${_GROQ_API_KEY},GOOGLE_API_KEY=${_GOOGLE_API_KEY}'

substitutions:
  _GROQ_API_KEY: ""  # Set via command line: --substitutions=_GROQ_API_KEY=your_key
  _GOOGLE_API_KEY: ""  # Set via command line: --substitutions=_GOOGLE_API_KEY=your_key

images:
  - 'gcr.io/$PROJECT_ID/insightforge:$SHORT_SHA' 